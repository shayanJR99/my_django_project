<!-- templates/accounts/login.html -->

{% load static %}

<!doctype html>

<html lang="en" dir="ltr">
    <head>
        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="{% static 'css/log_in_out.css' %}" />

        <title>Login</title>
    </head>

    <body>
        <div class="continer">
            <div class="circle circle__blue"></div>

            <div class="circle circle__orange"></div>

            <form
                action="{% url 'accounts:login' %}"
                class="form"
                method="post"
            >
                {% csrf_token %}

                <h1 class="titel">Login Here</h1>

                {% if form.errors %}

                <div
                    style="
                        color: red;
                        margin-bottom: 15px;
                        text-align: center;
                        font-weight: bold;
                    "
                >
                    Email or Password is incorrect
                </div>

                {% endif %}

                <div class="form__input">
                    <label class="form__label" for="username">
                        <b>Email</b>
                    </label>

                    <input
                        class="input"
                        type="email"
                        name="username"
                        id="username"
                        placeholder="email"
                    />
                </div>

                <div class="form__input">
                    <label class="form__label" for="password">
                        <b>Password</b>
                    </label>

                    <input
                        class="input"
                        type="password"
                        name="password"
                        id="password"
                        placeholder="password"
                    />
                </div>

                <button class="submit" type="submit">Log in</button>
            </form>
        </div>
    </body>
</html>
