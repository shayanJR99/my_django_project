<!doctype html>
<html lang="fa" dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>صفحه اصلی من</title>
        <style>
            body {
                font-family: "Tahoma", Arial, sans-serif;
                background-color: #f4f4f9;
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                color: #333;
            }
            .container {
                text-align: center;
                background: white;
                padding: 2rem;
                border-radius: 15px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                max-width: 400px;
            }
            h1 {
                color: #2c3e50;
            }
            p {
                line-height: 1.6;
            }
            .btn {
                display: inline-block;
                margin-top: 20px;
                padding: 10px 20px;
                background-color: #3498db;
                color: white;
                text-decoration: none;
                border-radius: 5px;
                transition: background 0.3s;
            }
            .btn:hover {
                background-color: #2980b9;
            }
        </style>
    </head>
    <body>
        {% if user.is_authenticated %}

        <a href="{% url 'blog:myposts' %}"> My Posts </a>

        <form action="{% url 'accounts:logout' %}" method="post">
            {% csrf_token %}

            <button type="submit">Logout</button>
        </form>

        {% else %}

        <a href="{% url 'accounts:login' %}"> Login </a>

        {% endif %}
        <div class="container">
            <h1>به وب‌سایت من خوش آمدید</h1>
            <hr />
            <h1>{{name}}</h1>
            <p>
                این یک صفحه ساده طراحی شده با HTML و CSS است. امیدوارم از دیدن
                آن لذت ببرید!
            </p>
            <a href="#" class="btn">بیشتر بدانید</a>
        </div>
    </body>
</html>
